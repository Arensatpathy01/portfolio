  <text x="810" y="286" font-family="JetBrains Mono, monospace" font-size="14" fill="#34d399">"SWE 2"</text>

  <text x="746" y="314" font-family="JetBrains Mono, monospace" font-size="14" fill="#60a5fa">company:</text>
  <text x="836" y="314" font-family="JetBrains Mono, monospace" font-size="14" fill="#34d399">"NetApp"</text>

  <text x="746" y="342" font-family="JetBrains Mono, monospace" font-size="14" fill="#60a5fa">skills:</text>
  <text x="826" y="342" font-family="JetBrains Mono, monospace" font-size="14" fill="#fbbf24">[</text>
  <text x="840" y="342" font-family="JetBrains Mono, monospace" font-size="14" fill="#34d399">"C++"</text>
  <text x="886" y="342" font-family="JetBrains Mono, monospace" font-size="14" fill="#fbbf24">,</text>
  <text x="896" y="342" font-family="JetBrains Mono, monospace" font-size="14" fill="#34d399">"Python"</text>
  <text x="966" y="342" font-family="JetBrains Mono, monospace" font-size="14" fill="#fbbf24">]</text>

  <text x="746" y="370" font-family="JetBrains Mono, monospace" font-size="14" fill="#60a5fa">passion:</text>
  <text x="840" y="370" font-family="JetBrains Mono, monospace" font-size="14" fill="#34d399">"building"</text>

  <text x="726" y="398" font-family="JetBrains Mono, monospace" font-size="14" fill="#f1f5f9">};</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(24,28,38,0.8)" />
  <text x="80" y="610" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="#64748b">🌐 Interactive 3D Portfolio — Built with Three.js</text>

