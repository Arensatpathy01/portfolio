<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d12" />
      <stop offset="50%" style="stop-color:#12151c" />
      <stop offset="100%" style="stop-color:#0b0d12" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="200" fill="rgba(96,165,250,0.05)" />
  <circle cx="1100" cy="550" r="250" fill="rgba(167,139,250,0.04)" />
  <circle cx="900" cy="100" r="150" fill="rgba(110,231,183,0.03)" />

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />

  <!-- Left content area -->
  <!-- Name -->
  <text x="80" y="220" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Aren Satpathy</text>

  <!-- Title -->
  <text x="80" y="275" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#60a5fa">Software Engineer 2</text>

