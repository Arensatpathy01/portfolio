  <text x="115" y="412" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">C++</text>

  <rect x="162" y="390" width="160" height="34" rx="8" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.25)" stroke-width="1" />
  <text x="242" y="412" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">Embedded Systems</text>

  <rect x="334" y="390" width="95" height="34" rx="8" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.25)" stroke-width="1" />
  <text x="381" y="412" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">DevOps</text>

  <rect x="441" y="390" width="85" height="34" rx="8" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.25)" stroke-width="1" />
  <text x="483" y="412" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">Python</text>

  <!-- Stats -->
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="#f1f5f9">3+</text>
  <text x="80" y="515" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#64748b">Years Exp.</text>

  <text x="230" y="490" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="#f1f5f9">3</text>
